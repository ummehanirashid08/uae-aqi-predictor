
    <!DOCTYPE html>
    <html>
    <head>
        <meta charset="utf-8">
        <title>AQI SHAP Explainability Report</title>
        <style>
            body {
                margin: 0;
                padding: 0;
                background: #f8fafc;
                font-family: Arial, sans-serif;
                color: #0f172a;
            }

            .container {
                max-width: 1180px;
                margin: 0 auto;
                padding: 34px 24px 60px;
            }

            .hero {
                background: linear-gradient(135deg, #fff8d8 0%, #facc15 100%);
                border: 1px solid #fde68a;
                border-radius: 28px;
                padding: 34px;
                box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
                margin-bottom: 24px;
            }

            .hero h1 {
                margin: 0 0 10px;
                font-size: 38px;
                letter-spacing: -1px;
            }

            .hero p {
                margin: 0;
                color: #475569;
                font-size: 16px;
                font-weight: 700;
            }

            .card {
                background: #fffdf2;
                border: 1px solid #f3e8a2;
                border-radius: 24px;
                padding: 24px;
                box-shadow: 0 14px 34px rgba(15, 23, 42, 0.06);
                margin-bottom: 24px;
            }

            .grid {
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 16px;
                margin-bottom: 24px;
            }

            .metric {
                background: white;
                border: 1px solid #e5e7eb;
                border-radius: 18px;
                padding: 18px;
            }

            .metric-title {
                color: #64748b;
                font-size: 13px;
                font-weight: 800;
                margin-bottom: 8px;
            }

            .metric-value {
                font-size: 28px;
                font-weight: 900;
                color: #0f172a;
            }

            h2 {
                font-size: 26px;
                margin: 0 0 16px;
                letter-spacing: -0.7px;
            }

            .note {
                background: #eff6ff;
                color: #1e40af;
                border: 1px solid #bfdbfe;
                border-radius: 18px;
                padding: 16px;
                font-weight: 700;
                line-height: 1.55;
                margin-bottom: 24px;
            }

            .warning {
                background: #fff7ed;
                color: #9a3412;
                border: 1px solid #fed7aa;
                border-radius: 18px;
                padding: 16px;
                font-weight: 700;
                line-height: 1.55;
                margin-bottom: 24px;
            }

            table {
                width: 100%;
                border-collapse: collapse;
                background: white;
                border-radius: 16px;
                overflow: hidden;
            }

            th, td {
                text-align: left;
                border-bottom: 1px solid #e5e7eb;
                padding: 12px 14px;
                font-size: 14px;
            }

            th {
                background: #f1f5f9;
                font-weight: 900;
                color: #334155;
            }

            pre {
                white-space: pre-wrap;
                background: #0f172a;
                color: #e5e7eb;
                border-radius: 18px;
                padding: 18px;
                overflow-x: auto;
            }

            @media (max-width: 900px) {
                .grid {
                    grid-template-columns: repeat(2, 1fr);
                }
            }

            @media (max-width: 600px) {
                .grid {
                    grid-template-columns: 1fr;
                }

                .hero h1 {
                    font-size: 30px;
                }
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="hero">
                <h1>AQI SHAP Explainability Report</h1>
                <p>Generated automatically on 2026-06-08 14:38:54 UTC</p>
            </div>
            
        <div class="warning">
            Model bundle is not available, so SHAP values could not be calculated.
            Run the training pipeline first.
        </div>
        
        </div>
    </body>
    </html>
