name: Training pipeline daily

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  training-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python src/training_pipeline.py
      - name: Commit updated model registry
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add models/aqi_model.joblib models/metrics.json || true
          git commit -m "Train AQI model" || echo "No changes"
          git push || true
