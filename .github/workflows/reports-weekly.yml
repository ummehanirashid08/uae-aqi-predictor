name: Reports weekly

on:
  schedule:
    - cron: "15 23 * * 0"
  workflow_dispatch:

jobs:
  reports-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    permissions:
      contents: write

    env:
      HOPSWORKS_API_KEY: ${{ secrets.HOPSWORKS_API_KEY }}
      HOPSWORKS_PROJECT_NAME: ${{ secrets.HOPSWORKS_PROJECT_NAME }}
      USE_HOPSWORKS: "true"
      TMP: "/tmp"
      TEMP: "/tmp"

    steps:
      - name: Run actions/checkout@v4
        uses: actions/checkout@v4

      - name: Run actions/setup-python@v5
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Run pip install -r requirements.txt
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: Run EDA and explainability reports
        run: |
          python src/eda_report.py

      - name: Commit updated reports
        if: always()
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add reports/eda_report.html || true
          git add reports/eda_summary.json || true
          git add reports/explainability_report.html || true
          git add reports/feature_importance.csv || true
          git commit -m "Update EDA and explainability reports" || echo "No report changes to commit"
          git push || echo "No changes pushed"

      - name: Upload reports artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aqi-reports
          path: |
            reports/eda_report.html
            reports/eda_summary.json
            reports/explainability_report.html
            reports/feature_importance.csv
          if-no-files-found: warn
          retention-days: 30